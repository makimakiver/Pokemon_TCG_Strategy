<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kaggle_mcts — performance</title>
<style>
  :root { --bg:#0f1419; --panel:#1a212b; --ink:#e6edf3; --muted:#8b98a5;
          --line:#3fb950; --grid:#2a3340; --accent:#58a6ff; }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         background:var(--bg); color:var(--ink); padding:32px; }
  h1 { font-size:20px; margin:0 0 4px; }
  p.sub { color:var(--muted); margin:0 0 24px; }
  .card { background:var(--panel); border:1px solid var(--grid); border-radius:12px;
          padding:24px; max-width:860px; }
  .row { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:20px; }
  .stat { background:var(--bg); border:1px solid var(--grid); border-radius:8px;
          padding:12px 16px; min-width:120px; }
  .stat .k { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
  .stat .v { font-size:22px; font-weight:600; margin-top:2px; }
  svg { width:100%; height:auto; display:block; }
  .drop { border:1.5px dashed var(--grid); border-radius:8px; padding:18px;
          text-align:center; color:var(--muted); margin-top:8px; cursor:pointer; }
  .drop:hover { border-color:var(--accent); color:var(--ink); }
  .drop.hot { border-color:var(--accent); background:rgba(88,166,255,.08); }
  input[type=file] { display:none; }
  code { background:var(--bg); padding:2px 6px; border-radius:4px; color:var(--accent); }
  .err { color:#f85149; }
</style>
</head>
<body>
  <div class="card">
    <h1>kaggle_mcts — evaluation win rate</h1>
    <p class="sub">MCTS self-play agent vs. random opponent, per training round.</p>

    <div class="row" id="stats"></div>
    <div id="chart"></div>

    <label class="drop" id="drop">
      <strong>Load <code>metrics.json</code></strong> — click to pick, or drag &amp; drop the file here.
      <input type="file" id="file" accept="application/json,.json">
    </label>
    <p class="sub" id="msg" style="margin-top:12px"></p>
  </div>

<script>
const W = 800, H = 360, PAD = {t:20, r:20, b:48, l:52};
const $ = s => document.querySelector(s);

function render(data) {
  if (!Array.isArray(data) || data.length === 0) {
    $('#msg').innerHTML = '<span class="err">No rounds in metrics.json yet.</span>';
    return;
  }
  // Stats
  const last = data[data.length - 1];
  const best = data.reduce((a, b) => (b.win_rate > a.win_rate ? b : a));
  $('#stats').innerHTML = [
    ['Rounds', data.length],
    ['Latest win rate', last.win_rate + '%'],
    ['Best win rate', best.win_rate + '% (round ' + best.round + ')'],
    ['Eval games/round', last.eval_games ?? '—'],
  ].map(([k, v]) => `<div class="stat"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('');

  // Chart scales — x by round index, y fixed 0..100 (%)
  const xs = data.map(d => d.round);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const sx = r => PAD.l + (xMax === xMin ? 0.5 : (r - xMin) / (xMax - xMin)) * (W - PAD.l - PAD.r);
  const sy = v => PAD.t + (1 - v / 100) * (H - PAD.t - PAD.b);

  const gridY = [0, 25, 50, 75, 100];
  const yLines = gridY.map(v =>
    `<line x1="${PAD.l}" y1="${sy(v)}" x2="${W - PAD.r}" y2="${sy(v)}" stroke="var(--grid)"/>
     <text x="${PAD.l - 8}" y="${sy(v) + 4}" fill="var(--muted)" font-size="11" text-anchor="end">${v}%</text>`
  ).join('');

  const xLabels = data.map(d =>
    `<text x="${sx(d.round)}" y="${H - PAD.b + 20}" fill="var(--muted)" font-size="11" text-anchor="middle">${d.round}</text>`
  ).join('');

  const path = data.map((d, i) => (i ? 'L' : 'M') + sx(d.round) + ' ' + sy(d.win_rate)).join(' ');
  const dots = data.map(d =>
    `<circle cx="${sx(d.round)}" cy="${sy(d.win_rate)}" r="4" fill="var(--line)">
       <title>round ${d.round}: ${d.win_rate}% (${d.wins ?? '?'}W/${d.losses ?? '?'}L)</title>
     </circle>`
  ).join('');

  $('#chart').innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" role="img" aria-label="win rate per round">
      ${yLines}
      <text x="${PAD.l + (W - PAD.l - PAD.r) / 2}" y="${H - 8}" fill="var(--muted)" font-size="12" text-anchor="middle">training round</text>
      <path d="${path}" fill="none" stroke="var(--line)" stroke-width="2.5"/>
      ${dots}
      ${xLabels}
    </svg>`;
  $('#msg').textContent = '';
}

function loadJSON(text) {
  try { render(JSON.parse(text)); }
  catch (e) { $('#msg').innerHTML = '<span class="err">Could not parse JSON: ' + e.message + '</span>'; }
}

// 1) Try auto-fetch (works when served). The page may be opened from the repo
// root, from out/, or from rl/ — try the candidate paths metrics.json could be at.
const CANDIDATES = ['out/metrics.json', 'metrics.json', '../out/metrics.json'];
(async () => {
  for (const url of CANDIDATES) {
    try {
      const r = await fetch(url, { cache: 'no-store' });
      if (r.ok) { loadJSON(await r.text()); return; }
    } catch (_) { /* try next */ }
  }
  $('#msg').textContent = 'Tip: run `python -m http.server` from the repo root to auto-load out/metrics.json, or drop the file below.';
})();

// 2) File picker fallback (works on a plain file:// double-click).
$('#file').addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) f.text().then(loadJSON);
});
const drop = $('#drop');
['dragover', 'dragenter'].forEach(ev => drop.addEventListener(ev, e => {
  e.preventDefault(); drop.classList.add('hot');
}));
['dragleave', 'drop'].forEach(ev => drop.addEventListener(ev, e => {
  e.preventDefault(); drop.classList.remove('hot');
}));
drop.addEventListener('drop', e => {
  const f = e.dataTransfer.files[0];
  if (f) f.text().then(loadJSON);
});
</script>
</body>
</html>
